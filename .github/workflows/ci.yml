name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run documentation and skeleton verifiers
        run: |
          bash scripts/verify-adr-review-path-doc.sh
          bash scripts/verify-asset-identity-privilege-context-baseline.sh
          bash scripts/verify-ai-hunt-plane-adr.sh
          bash scripts/verify-architecture-doc.sh
          bash scripts/verify-architecture-runbook-validation.sh
          bash scripts/verify-auth-baseline-doc.sh
          bash scripts/verify-canonical-telemetry-schema-doc.sh
          bash scripts/verify-contributor-naming-guide-doc.sh
          bash scripts/verify-compose-skeleton-validation.sh
          bash scripts/verify-compose-skeleton-overview-doc.sh
          bash scripts/verify-control-plane-state-model-doc.sh
          bash scripts/verify-automation-substrate-contract-doc.sh
          bash scripts/verify-control-plane-schema-skeleton.sh
          bash scripts/verify-detection-lifecycle-and-rule-qa-framework.sh
          bash scripts/verify-documentation-ownership-map.sh
          bash scripts/verify-secops-domain-model-doc.sh
          bash scripts/verify-ingest-compose-skeleton.sh
          bash scripts/verify-naming-conventions-doc.sh
          bash scripts/verify-network-exposure-policy-doc.sh
          bash scripts/verify-n8n-compose-skeleton.sh
          bash scripts/verify-n8n-workflow-category-guidance.sh
          bash scripts/verify-n8n-workflow-skeleton.sh
          bash scripts/verify-opensearch-compose-skeleton.sh
          bash scripts/verify-parameter-catalog-alignment.sh
          bash scripts/verify-parameter-catalog-structure-doc.sh
          bash scripts/verify-parameter-category-docs.sh
          bash scripts/verify-parameter-config-files.sh
          bash scripts/run-ci-phase-contract.sh all-verifiers
          bash scripts/verify-positive-smb-value-proposition.sh
          bash scripts/verify-postgres-compose-skeleton.sh
          bash scripts/verify-publishable-path-hygiene.sh
          bash scripts/verify-proxy-compose-skeleton.sh
          bash scripts/verify-response-action-safety-model-doc.sh
          bash scripts/verify-requirements-baseline-control-plane-thesis.sh
          bash scripts/verify-readme-and-repository-structure-control-plane-thesis.sh
          bash scripts/verify-repository-skeleton.sh
          bash scripts/verify-repository-structure-doc.sh
          bash scripts/verify-retention-baseline-doc.sh
          bash scripts/verify-runbook-doc.sh
          bash scripts/verify-safe-query-gateway-doc.sh
          bash scripts/verify-secops-business-hours-operating-model-doc.sh
          bash scripts/verify-sigma-curated-skeleton.sh
          bash scripts/verify-sigma-n8n-skeleton-validation.sh
          bash scripts/verify-sigma-to-opensearch-translation-strategy-doc.sh
          bash scripts/verify-storage-policy-doc.sh
          bash scripts/verify-source-onboarding-contract-doc.sh
          bash scripts/verify-wazuh-rule-lifecycle-runbook.sh
          bash scripts/verify-windows-source-onboarding-assets.sh

      - name: Run Phase 8 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-8-workflow-coverage.sh

      - name: Run Phase 9 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-9-workflow-coverage.sh

      - name: Run Phase 10 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-10-workflow-coverage.sh

      - name: Run Phase 11 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-11-workflow-coverage.sh

      - name: Run Phase 12 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-12-workflow-coverage.sh

      - name: Run Phase 13 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-13-workflow-coverage.sh

      - name: Run Phase 11 control-plane validation
        run: |
          bash scripts/verify-phase-11-control-plane-ci-validation.sh
          python3 -m unittest control-plane.tests.test_service_persistence_ingest_case_lifecycle control-plane.tests.test_service_persistence_action_reconciliation control-plane.tests.test_postgres_store control-plane.tests.test_cli_inspection

      - name: Run Phase 12 Wazuh validation
        run: |
          bash scripts/verify-phase-12-wazuh-ci-validation.sh
          python3 -m unittest control-plane.tests.test_wazuh_alert_ingest_contract_docs control-plane.tests.test_wazuh_adapter control-plane.tests.test_service_persistence_assistant_advisory control-plane.tests.test_service_persistence_ingest_case_lifecycle control-plane.tests.test_cli_inspection

      - name: Run Phase 13 guarded automation validation
        run: |
          bash scripts/verify-phase-13-guarded-automation-ci-validation.sh
          python3 -m unittest control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_records_execution_correlation_mismatch_states_separately control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_evaluates_action_policy_into_approval_and_isolated_executor control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_evaluates_action_policy_into_shuffle_without_human_approval control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_delegates_approved_low_risk_action_through_shuffle_adapter control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_rejects_shuffle_delegation_for_non_shuffle_execution_policy control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_delegates_approved_high_risk_action_through_isolated_executor control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_reconciles_shuffle_run_back_into_authoritative_action_execution control-plane.tests.test_service_persistence_action_reconciliation.ActionReconciliationPersistenceTests.test_service_reconciles_isolated_executor_run_back_into_authoritative_action_execution

      - name: Run Phase 14 identity-rich source family validation
        run: bash scripts/verify-phase-14-identity-rich-source-family-design.sh

      - name: Run Phase 14 identity-rich source expansion validation
        run: |
          bash scripts/verify-phase-14-identity-rich-source-expansion-ci-validation.sh
          python3 -m unittest control-plane.tests.test_phase14_identity_rich_source_profile_docs control-plane.tests.test_wazuh_adapter control-plane.tests.test_service_persistence_ingest_case_lifecycle control-plane.tests.test_cli_inspection

      - name: Run Phase 14 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-14-workflow-coverage.sh

      - name: Run Phase 15 identity-grounded analyst-assistant boundary validation
        run: |
          bash scripts/verify-phase-15-identity-grounded-analyst-assistant-boundary.sh
          python3 -m unittest control-plane.tests.test_phase15_identity_grounded_analyst_assistant_boundary_docs control-plane.tests.test_service_persistence_assistant_advisory.AssistantAdvisoryPersistenceTests.test_service_fails_closed_when_identity_context_is_alias_only control-plane.tests.test_service_persistence_assistant_advisory.AssistantAdvisoryPersistenceTests.test_service_fails_closed_when_recommendation_text_claims_authority_or_scope_expansion

      - name: Run Phase 15 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-15-workflow-coverage.sh

      - name: Run Phase 16 first-boot contract validation
        run: |
          bash scripts/verify-phase-16-first-boot-contract.sh
          bash scripts/test-verify-phase-16-first-boot-contract.sh

      - name: Run Phase 16 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-16-workflow-coverage.sh

      - name: Run Phase 19 thin operator surface validation
        run: |
          bash scripts/verify-phase-19-thin-operator-surface.sh
          python3 -m unittest control-plane.tests.test_phase19_operator_surface_docs control-plane.tests.test_phase19_operator_workflow_validation

      - name: Run Phase 19 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-19-workflow-coverage.sh

      - name: Run Phase 20 low-risk action boundary validation
        run: |
          bash scripts/verify-phase-20-low-risk-action-boundary.sh
          python3 -m unittest control-plane.tests.test_phase20_low_risk_action_docs control-plane.tests.test_phase20_low_risk_action_validation

      - name: Run Phase 20 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-20-workflow-coverage.sh

      - name: Run Phase 21 production-like hardening boundary validation
        run: |
          bash scripts/verify-phase-21-production-like-hardening-boundary.sh
          python3 -m unittest control-plane.tests.test_phase21_end_to_end_validation control-plane.tests.test_phase21_production_like_hardening_boundary_docs control-plane.tests.test_phase21_production_like_hardening_boundary_validation

      - name: Run Phase 21 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-21-workflow-coverage.sh

      - name: Run Phase 22 operator trust boundary validation
        run: |
          bash scripts/verify-phase-22-operator-trust-boundary.sh
          python3 -m unittest control-plane.tests.test_phase22_end_to_end_validation control-plane.tests.test_phase22_operator_trust_boundary_docs control-plane.tests.test_phase22_operator_trust_boundary_validation

      - name: Run Phase 22 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-22-workflow-coverage.sh

      - name: Run Phase 23 authority-closure validation
        run: |
          bash scripts/verify-phase-23-authority-closure.sh
          python3 -m unittest control-plane.tests.test_phase23_end_to_end_validation control-plane.tests.test_phase23_approval_surface_validation control-plane.tests.test_phase23_transition_logging_validation control-plane.tests.test_phase23_substrate_simplification_validation

      - name: Run Phase 23 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-23-workflow-coverage.sh

      - name: Run Phase 24 live assistant workflow contract validation
        run: |
          bash scripts/verify-phase-24-live-assistant-workflow-contract.sh
          python3 -m unittest control-plane.tests.test_phase24_live_assistant_workflow_docs
          python3 -m unittest control-plane.tests.test_phase24_live_assistant_validation

      - name: Run Phase 24 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-24-workflow-coverage.sh

      - name: Run Phase 25 operator runbook validation
        run: |
          bash scripts/verify-phase-25-multi-source-case-review-runbook.sh
          python3 -m unittest control-plane.tests.test_phase25_multi_source_case_admission_docs
          python3 -m unittest control-plane.tests.test_phase25_osquery_host_context_validation

      - name: Run Phase 25 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-25-workflow-coverage.sh

      - name: Run Phase 26 ticket coordination validation
        run: |
          bash scripts/verify-phase-26-ticket-coordination-validation.sh
          python3 -m unittest control-plane.tests.test_phase26_end_to_end_validation control-plane.tests.test_phase26_coordination_substrate_boundary_docs control-plane.tests.test_phase26_create_tracking_ticket_soft_write_contract_docs

      - name: Run Phase 26 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-26-workflow-coverage.sh

      - name: Run Phase 27 day-2 hardening validation
        run: |
          bash scripts/verify-phase-27-day-2-hardening-validation.sh
          python3 -m unittest control-plane.tests.test_phase27_day2_hardening_validation control-plane.tests.test_phase27_day2_runtime_contract
          python3 -m unittest control-plane.tests.test_service_persistence_restore_readiness.RestoreReadinessPersistenceTests.test_service_phase21_backup_restore_and_restore_drill_preserve_record_chain control-plane.tests.test_service_persistence_restore_readiness.RestoreReadinessPersistenceTests.test_service_phase21_restore_drill_fails_closed_when_runtime_bindings_missing_after_restore control-plane.tests.test_service_persistence_restore_readiness.RestoreReadinessPersistenceTests.test_service_phase21_readiness_surfaces_source_and_automation_health control-plane.tests.test_phase21_runtime_auth_validation.Phase21RuntimeAuthValidationTests.test_startup_status_reports_missing_reviewed_identity_provider_binding control-plane.tests.test_phase21_runtime_auth_validation.Phase21RuntimeAuthValidationTests.test_protected_surface_request_rejects_unreviewed_identity_provider_boundary control-plane.tests.test_runtime_secret_boundary.RuntimeSecretBoundaryTests.test_runtime_config_fails_closed_when_openbao_backend_is_unavailable control-plane.tests.test_runtime_secret_boundary.RuntimeSecretBoundaryTests.test_runtime_config_reloads_rotated_openbao_secret_on_fresh_load

      - name: Run Phase 27 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-27-workflow-coverage.sh

      - name: Run Phase 28 endpoint evidence-pack boundary validation
        run: |
          bash scripts/verify-phase-28-endpoint-evidence-pack-boundary.sh
          python3 -m unittest control-plane.tests.test_phase28_endpoint_evidence_pack_boundary_docs

      - name: Run Phase 28 workflow coverage guard
        run: bash scripts/test-verify-ci-phase-28-workflow-coverage.sh

      - name: Run control-plane runtime unit tests
        run: python3 -m unittest discover -s control-plane/tests -p 'test_*.py'

      - name: Run focused shell tests
        run: |
          bash scripts/test-verify-asset-identity-privilege-context-baseline.sh
          bash scripts/test-verify-auth-baseline-doc.sh
          bash scripts/test-verify-ci-phase-7-workflow-coverage.sh
          bash scripts/test-verify-canonical-telemetry-schema-doc.sh
          bash scripts/test-verify-n8n-compose-skeleton.sh
          bash scripts/test-verify-n8n-workflow-category-guidance.sh
          bash scripts/test-verify-n8n-workflow-skeleton.sh
          bash scripts/test-verify-ingest-compose-skeleton.sh
          bash scripts/test-verify-opensearch-compose-skeleton.sh
          bash scripts/test-verify-architecture-runbook-validation.sh
          bash scripts/test-verify-ci-publishable-path-hygiene.sh
          bash scripts/test-verify-postgres-compose-skeleton.sh
          bash scripts/test-verify-publishable-path-hygiene.sh
          bash scripts/test-verify-proxy-compose-skeleton.sh
          bash scripts/test-verify-compose-skeleton-validation.sh
          bash scripts/test-verify-compose-skeleton-overview-doc.sh
          bash scripts/test-verify-automation-substrate-contract-doc.sh
          bash scripts/test-verify-control-plane-state-model-doc.sh
          bash scripts/test-verify-control-plane-schema-skeleton.sh
          bash scripts/test-verify-detection-lifecycle-and-rule-qa-framework.sh
          bash scripts/test-verify-positive-smb-value-proposition.sh
          bash scripts/run-ci-phase-contract.sh all-shell-tests
          bash scripts/test-verify-ci-phase-contract-runner.sh
          bash scripts/test-verify-requirements-baseline-control-plane-thesis.sh
          bash scripts/test-verify-readme-and-repository-structure-control-plane-thesis.sh
          bash scripts/test-verify-repository-skeleton.sh
          bash scripts/test-verify-response-action-safety-model-doc.sh
          bash scripts/test-verify-retention-baseline-doc.sh
          bash scripts/test-verify-safe-query-gateway-doc.sh
          bash scripts/test-verify-secops-business-hours-operating-model-doc.sh
          bash scripts/test-verify-secops-domain-model-doc.sh
          bash scripts/test-verify-sigma-curated-skeleton.sh
          bash scripts/test-verify-sigma-n8n-skeleton-validation.sh
          bash scripts/test-verify-sigma-to-opensearch-translation-strategy-doc.sh
          bash scripts/test-verify-source-onboarding-contract-doc.sh
          bash scripts/test-verify-wazuh-rule-lifecycle-runbook.sh
          bash scripts/test-verify-windows-source-onboarding-assets.sh
