required_inputs:
  - action_request_id
  - approval_decision_id
  - correlation_id
  - escalation_subject_id
  - escalation_owner_id
  - escalation_scope
  - reviewed_template_version
  - requested_by
  - callback_url
  - callback_secret_ref
