  reviewed_template_version: manual_escalation_request-v1-reviewed-2026-05-03
  owner: AegisOps maintainers
  review_status: reviewed
  import_eligible: true
  template_custody: repo-owned reviewed template catalog only
  action_type: manual_escalation_request
required_bindings:
  - action_request_id
  - approval_decision_id
  - correlation_id
  - execution_receipt_id
  - normalized_receipt_ref
  - escalation_subject_id
  - escalation_owner_id
  - escalation_scope
